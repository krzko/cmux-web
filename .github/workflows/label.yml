name: Label

# Labels PRs from their conventional-commit title so release notes categorise
# correctly. Dependabot labels its own PRs and is skipped.
on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Label from title
        env:
          GH_TOKEN: ${{ github.token }}
          TITLE: ${{ github.event.pull_request.title }}
          NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          case "$TITLE" in
            feat*) label=enhancement ;;
            fix*) label=bug ;;
            docs*) label=documentation ;;
            *) label='' ;;
          esac
          if [ -n "$label" ]; then
            gh pr edit "$NUMBER" --repo "$REPO" --add-label "$label"
          fi
